<!DOCTYPE html>
<html>
<head>
  <title>Incident AI Resolver</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #020617, #000);
      color: #e2e8f0;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      text-shadow: 0 0 25px #38bdf8;
    }

    .controls { text-align:center; margin:20px; }

    button {
      padding: 12px 20px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg,#22c55e,#16a34a);
      color:white;
      transition:.3s;
    }

    button:hover {
      transform:scale(1.05);
      box-shadow:0 0 20px #22c55e;
    }

    .status-bar {
      text-align:center;
      font-weight:bold;
      margin:15px;
      font-size:18px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .card {
      background:#0f172a;
      padding:20px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 0 20px rgba(56,189,248,.2);
    }

    .value {
      font-size:26px;
      font-weight:bold;
    }

    .panel {
      margin-top:20px;
      padding:20px;
      background:#0f172a;
      border-radius:12px;
    }

    .panel-title {
      color:#38bdf8;
      margin-bottom:10px;
    }

    .chart-box {
      margin-top:20px;
      background:#0f172a;
      padding:15px;
      border-radius:12px;
    }

    .timeline {
      margin-top:20px;
      max-height:200px;
      overflow:auto;
      font-size:13px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>🚨 Incident AI Resolver</h1>

<div class="controls">
  <button onclick="startIncident(this)">Start Incident</button>
  <button onclick="startLive(this)">Start Monitoring</button>
  <button onclick="stopLive(this)">Stop</button>
</div>

<div class="status-bar" id="status">System Idle</div>

<div class="grid">
  <div class="card"><div>CPU</div><div id="cpu" class="value">0</div></div>
  <div class="card"><div>Memory</div><div id="memory" class="value">0</div></div>
  <div class="card"><div>Latency</div><div id="latency" class="value">0</div></div>
</div>

<div class="panel">
  <div class="panel-title">⚡ Decision</div>
  <p id="action"></p>
  <p id="reason"></p>
  <p id="reward"></p>
  <p id="confidence"></p>
</div>

<div class="panel">
  <div class="panel-title">🧠 AI Insight</div>
  <p id="insight"></p>
</div>

<div class="panel">
  <div class="panel-title">⚠️ Anomalies</div>
  <p id="anomaly"></p>
</div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<div class="timeline" id="timeline"></div>

</div>

<script>

const BASE_URL = "https://prathamesh-23-incident-ai.hf.space";

let interval;
let target = {cpu:0,memory:0,latency:0};
let current = {cpu:0,memory:0,latency:0};
let lastReward = 0;
let prev = {cpu:0,memory:0,latency:0};

// chart
const ctx = document.getElementById("chart").getContext("2d");
const chart = new Chart(ctx,{
  type:"line",
  data:{
    labels:[],
    datasets:[
      {label:"CPU",data:[]},
      {label:"Memory",data:[]},
      {label:"Latency",data:[]}
    ]
  }
});


// 🔥 randomness injection
function noise(){
  return (Math.random()*6 - 3);
}


// 🔥 smooth + noisy stream
setInterval(()=>{
  for(let k in current){
    let noisyTarget = target[k] + noise();
    current[k] += (noisyTarget - current[k]) * 0.25;
    document.getElementById(k).innerText = Math.round(current[k]);
  }

  chart.data.labels.push("");
  chart.data.datasets[0].data.push(current.cpu);
  chart.data.datasets[1].data.push(current.memory);
  chart.data.datasets[2].data.push(current.latency);

  if(chart.data.labels.length>25){
    chart.data.labels.shift();
    chart.data.datasets.forEach(d=>d.data.shift());
  }

  chart.update();

},300);


// 🔥 smarter insight using trend
function insight(o){
  let trendMem = o.memory - prev.memory;
  let trendLat = o.latency - prev.latency;

  if(o.memory>85 && trendMem>0)
    return "Memory leak worsening over time → immediate restart required";

  if(o.latency>150 && trendLat>0)
    return "Latency increasing → cascading failure risk";

  if(o.cpu>85)
    return "CPU overload → scaling needed";

  return "System stabilizing → metrics improving";
}


// anomaly
function anomaly(o){
  let a=[];
  if(o.cpu>80) a.push("CPU spike");
  if(o.memory>80) a.push("Memory leak");
  if(o.latency>150) a.push("Latency surge");
  return a.length?a.join(", "):"No anomalies";
}


// reward trend
function rewardLabel(r){
  if(r>lastReward) return "Improving 📈";
  if(r<lastReward) return "Degrading 📉";
  return "Stable ⚖️";
}


// timeline
function log(msg){
  let el=document.createElement("div");
  el.innerText=new Date().toLocaleTimeString()+" → "+msg;
  document.getElementById("timeline").prepend(el);
}


// update
function update(data){
  const o=data.observation;
  target=o;

  document.getElementById("action").innerText="Action: "+data.action;
  document.getElementById("reason").innerText="Reason: "+data.reason;
  document.getElementById("reward").innerText="Reward: "+data.reward.toFixed(2)+" ("+rewardLabel(data.reward)+")";
  document.getElementById("confidence").innerText="Confidence: "+(data.confidence*100).toFixed(0)+"%";

  document.getElementById("insight").innerText=insight(o);
  document.getElementById("anomaly").innerText=anomaly(o);

  lastReward=data.reward;
  prev=o;

  log(data.action+" → reward "+data.reward.toFixed(2));
}


// reset
function resetUI(){
  current={cpu:0,memory:0,latency:0};
  target={cpu:0,memory:0,latency:0};
  prev={cpu:0,memory:0,latency:0};

  chart.data.labels=[];
  chart.data.datasets.forEach(d=>d.data=[]);
  chart.update();

  document.getElementById("timeline").innerHTML="";
}


// start incident (randomized)
async function startIncident(btn){

  if(interval){
    clearInterval(interval);
    interval=null;
  }

  resetUI();

  let levels=["easy","medium","hard"];
  let level=levels[Math.floor(Math.random()*levels.length)];

  let res=await fetch(BASE_URL+"/set_incident",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({level})
  });

  let d=await res.json();

  target=d.observation;

  document.getElementById("status").innerText="New Incident ("+level+")";
  log("New random incident: "+level);
}


// start
function startLive(btn){
  if(interval) return;
  interval=setInterval(run,1200);
  document.getElementById("status").innerText="Monitoring Live";
}


// stop
function stopLive(btn){
  clearInterval(interval);
  interval=null;
  document.getElementById("status").innerText="Stopped";
}


// loop
async function run(){
  let res=await fetch(BASE_URL+"/live_monitor");
  let d=await res.json();

  update(d);

  if(d.done){
    stopLive();
    document.getElementById("status").innerText="Resolved ✅";
    log("System stabilized");
  }
}

</script>

</body>
</html>
