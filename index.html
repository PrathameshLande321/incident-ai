<!DOCTYPE html>
<html>
<head>
  <title>Incident AI Resolver</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: #e2e8f0;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 25px;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 18px;
      margin: 8px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #16a34a;
    }

    .status-bar {
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 16px;
    }

    .healthy { color: #22c55e; }
    .warning { color: #f59e0b; }
    .critical { color: #ef4444; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
      margin-top: 5px;
    }

    .panel {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      line-height: 1.6;
    }

    .panel-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .chart-box {
      margin-top: 25px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    .timeline {
      margin-top: 20px;
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 13px;
    }

    .timeline div {
      margin-bottom: 6px;
      opacity: 0.85;
    }

  </style>
</head>

<body>

<div class="container">

<h1>🚨 Incident AI Resolver</h1>

<div class="controls">
  <button onclick="startIncident()">Start Incident</button>
  <button onclick="startLive()">Start Monitoring</button>
  <button onclick="stopLive()">Stop</button>
</div>

<div class="status-bar" id="status">System Idle</div>

<!-- METRICS -->
<div class="grid">
  <div class="card">
    <div class="label">CPU</div>
    <div class="value" id="cpu">--</div>
  </div>
  <div class="card">
    <div class="label">Memory</div>
    <div class="value" id="memory">--</div>
  </div>
  <div class="card">
    <div class="label">Latency</div>
    <div class="value" id="latency">--</div>
  </div>
</div>

<!-- RESULT -->
<div class="panel">
  <div class="panel-title">⚡ Decision Output</div>
  <p><b>Action:</b> <span id="action">--</span></p>
  <p><b>Reason:</b> <span id="reason">--</span></p>
  <p><b>Reward:</b> <span id="reward">--</span></p>
  <p><b>Confidence:</b> <span id="confidence">--</span></p>
</div>

<!-- AI INSIGHT -->
<div class="panel">
  <div class="panel-title">🧠 AI Insight</div>
  <p id="insight">Waiting for analysis...</p>
</div>

<!-- ANOMALY -->
<div class="panel">
  <div class="panel-title">⚠️ Detected Anomalies</div>
  <p id="anomaly">None detected</p>
</div>

<!-- CHART -->
<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<!-- TIMELINE -->
<div class="timeline" id="timeline">
  <div>System initialized...</div>
</div>

</div>

<script>

const BASE_URL = "https://prathamesh-23-incident-ai.hf.space";
let interval = null;

// Chart
const ctx = document.getElementById("chart").getContext("2d");
const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: [],
    datasets: [
      { label: "CPU", data: [], borderWidth: 2 },
      { label: "Memory", data: [], borderWidth: 2 },
      { label: "Latency", data: [], borderWidth: 2 }
    ]
  },
  options: { responsive: true }
});

// Timeline log
function log(msg) {
  const box = document.getElementById("timeline");
  const el = document.createElement("div");
  el.innerText = msg;
  box.prepend(el);
}

// Health status
function updateStatus(cpu, mem, lat) {
  let status = "Healthy";
  let cls = "healthy";

  if (cpu > 80 || mem > 80 || lat > 180) {
    status = "Critical";
    cls = "critical";
  } else if (cpu > 60 || mem > 60 || lat > 120) {
    status = "Warning";
    cls = "warning";
  }

  const el = document.getElementById("status");
  el.innerText = status;
  el.className = "status-bar " + cls;
}

// Metrics update
function updateMetrics(obs) {
  document.getElementById("cpu").innerText = obs.cpu;
  document.getElementById("memory").innerText = obs.memory;
  document.getElementById("latency").innerText = obs.latency;

  chart.data.labels.push("");
  chart.data.datasets[0].data.push(obs.cpu);
  chart.data.datasets[1].data.push(obs.memory);
  chart.data.datasets[2].data.push(obs.latency);
  chart.update();

  updateStatus(obs.cpu, obs.memory, obs.latency);
}

// Anomaly detection
function detectAnomaly(cpu, mem, lat) {
  let issues = [];

  if (cpu > 80) issues.push("High CPU usage");
  if (mem > 80) issues.push("Memory pressure");
  if (lat > 180) issues.push("Latency spike");

  return issues.length ? issues.join(", ") : "System stable";
}

// AI Insight
function generateInsight(obs) {
  if (obs.memory > 80) return "Memory is critically high → restart reduces pressure.";
  if (obs.cpu > 80) return "CPU overload → scaling distributes load.";
  if (obs.latency > 150) return "Latency spike → restart improves response time.";
  return "System stabilizing, minimal intervention required.";
}

// Update AI panel
function updateAI(data) {
  document.getElementById("action").innerText = data.action;
  document.getElementById("reason").innerText = data.reason;
  document.getElementById("reward").innerText = data.reward;
  document.getElementById("confidence").innerText = data.confidence;

  document.getElementById("insight").innerText = generateInsight(data.observation);

  document.getElementById("anomaly").innerText =
    detectAnomaly(
      data.observation.cpu,
      data.observation.memory,
      data.observation.latency
    );
}

// Start incident
async function startIncident() {
  const res = await fetch(BASE_URL + "/set_incident", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ level: "hard" })
  });

  const data = await res.json();
  updateMetrics(data.observation);

  log("🚀 Incident started");
}

// Live loop
function startLive() {
  if (interval) return;
  interval = setInterval(runAI, 2000);
}

// Stop
function stopLive() {
  clearInterval(interval);
  interval = null;
  log("⏹ Monitoring stopped");
}

// Run AI
async function runAI() {
  const res = await fetch(BASE_URL + "/live_monitor");
  const data = await res.json();

  updateMetrics(data.observation);
  updateAI(data);

  log(`⚡ ${data.action} → ${data.reason}`);

  if (data.done) {
    stopLive();
    log("✅ System stabilized");
  }
}

</script>

</body>
</html>
