id: incident-ai-agent

name: AI Incident Resolver

description: AI agent that detects and resolves system incidents using CPU, memory, and latency metrics.

entrypoint:
  command: uvicorn api:app --host 0.0.0.0 --port 8000

ports:
  - 8000

endpoints:
  reset:
    path: /reset
    method: POST

  step:
    path: /step
    method: POST

resources:
  cpu: 1
  memory: 512Mi